<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HexZero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Board area */
    #board-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 0;
    }
    #board-canvas {
      display: block;
    }
    #swap-btn {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 24px;
      font-size: 14px;
      border: 1px solid #666;
      border-radius: 4px;
      background: #2a2a4a;
      color: #e0e0e0;
      cursor: pointer;
      display: none;
    }
    #swap-btn:hover { background: #3a3a5a; }

    /* Sidebar */
    #sidebar {
      width: 200px;
      background: #16213e;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      border-left: 1px solid #333;
      flex-shrink: 0;
    }
    #sidebar h1 { font-size: 20px; margin-bottom: 0; }
    #sidebar .subtitle { font-size: 12px; color: #888; }
    #sidebar hr { border: none; border-top: 1px solid #333; }
    #sidebar label { font-size: 13px; }

    .btn {
      padding: 6px 12px;
      font-size: 13px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a4a;
      color: #e0e0e0;
      cursor: pointer;
    }
    .btn:hover { background: #3a3a5a; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .size-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .size-group button {
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2a2a4a;
      color: #e0e0e0;
      cursor: pointer;
    }
    .size-group button:hover { background: #3a3a5a; }
    .size-group button.active { background: #4a6fa5; border-color: #6a8fc5; }

    select {
      padding: 4px 8px;
      font-size: 13px;
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
    }

    input[type="range"] { width: 100%; }
    input[type="checkbox"] { margin-right: 6px; }

    #status-bar {
      font-size: 13px;
      padding: 4px 8px;
      color: #ccc;
    }
    #move-info {
      font-size: 12px;
      color: #999;
    }

    /* ---- Responsive: stack on narrow screens ---- */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }
      #board-area {
        width: 100%;
        height: 60vh;
        min-height: 250px;
      }
      #sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid #333;
        padding: 12px 16px;
        gap: 10px;
        overflow-y: visible;
        max-height: 40vh;
        overflow-y: auto;
      }
      #sidebar h1 { font-size: 18px; }
      .btn { padding: 10px 16px; font-size: 14px; }
      .size-group button { padding: 8px 14px; font-size: 14px; }
      select { padding: 8px 12px; font-size: 14px; }
      #swap-btn { padding: 12px 28px; font-size: 16px; bottom: 12px; }
    }
  </style>
</head>
<body>
  <div id="board-area">
    <canvas id="board-canvas"></canvas>
    <button id="swap-btn">Swap (pie rule)</button>
  </div>
  <div id="sidebar">
    <h1>HexZero</h1>
    <span class="subtitle" id="eval-label">Random evaluator</span>
    <hr />
    <div id="status-bar">Blue's turn (yours)</div>
    <hr />
    <button class="btn" id="new-game-btn">New game</button>
    <button class="btn" id="undo-btn" disabled>Undo (Ctrl+Z)</button>
    <hr />
    <label>Board size:</label>
    <div class="size-group" id="size-group"></div>
    <hr />
    <label>First player:</label>
    <select id="first-player">
      <option value="blue" selected>Blue</option>
      <option value="red">Red</option>
    </select>
    <label>Blue:</label>
    <select id="blue-type"><option value="human">Human</option><option value="ai">AI</option></select>
    <label>Red:</label>
    <select id="red-type"><option value="human">Human</option><option value="ai" selected>AI</option></select>
    <hr />
    <label>AI sims: <span id="sims-label">200</span></label>
    <input type="range" id="sims-slider" min="1" max="5" step="0.1" value="2.3" />
    <hr />
    <label><input type="checkbox" id="pie-check" checked /> Pie rule</label>
    <label><input type="checkbox" id="mirror-check" /> Mirror board</label>
    <label><input type="checkbox" id="rotate-check" /> Rotate board 90&deg;</label>
    <hr />
    <div id="move-info"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
